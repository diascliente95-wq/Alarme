<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Alarme Inteligente - Relógio Corrigido</title>
    <style>
        /* --- ESTILOS (Mantidos) --- */
        :root {
            --bg-color: #121212;
            --panel-bg: #1e1e1e;
            --primary: #bb86fc;
            --secondary: #03dac6;
            --error: #cf6679;
            --warning: #ffb74d;
            --text-main: #e0e0e0;
            --text-muted: #a0a0a0;
            --font-display: 'Courier New', Courier, monospace;
            --font-ui: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: var(--font-ui);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        header { text-align: center; margin-bottom: 20px; width: 100%; max-width: 800px; }

        .clock-container {
            font-family: var(--font-display);
            font-size: 4rem;
            font-weight: bold;
            color: var(--secondary);
            text-shadow: 0 0 15px rgba(3, 218, 198, 0.4);
            background: rgba(30, 30, 30, 0.6);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid #333;
            margin-bottom: 5px;
            min-width: 300px;
        }

        .next-alarm-info {
            font-size: 1rem;
            color: var(--warning);
            margin-top: 10px;
            font-weight: bold;
        }

        .date-display { font-size: 1.1rem; color: var(--text-muted); }

        main {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            width: 100%;
            max-width: 900px;
        }

        @media (max-width: 768px) {
            main { grid-template-columns: 1fr; }
            .clock-container { font-size: 3rem; }
        }

        .card {
            background-color: var(--panel-bg);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            border: 1px solid #333;
        }

        h2 { color: var(--primary); margin-bottom: 15px; font-size: 1.4rem; border-bottom: 1px solid #333; padding-bottom: 8px; }

        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.9rem; }
        
        input[type="time"], input[type="text"], select, textarea {
            width: 100%;
            padding: 10px;
            background: #2c2c2c;
            border: 1px solid #444;
            color: white;
            border-radius: 6px;
            font-size: 1rem;
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); }

        /* Abas */
        .tabs { display: flex; margin-bottom: 15px; background: #2c2c2c; border-radius: 6px; padding: 4px; }
        .tab { flex: 1; padding: 8px; text-align: center; cursor: pointer; border-radius: 4px; transition: 0.3s; font-size: 0.9rem; }
        .tab.active { background-color: var(--primary); color: #000; font-weight: bold; }
        .audio-mode { display: none; }
        .audio-mode.active { display: block; }

        /* Botões */
        .btn { width: 100%; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 1rem; font-weight: bold; transition: 0.2s; display: flex; justify-content: center; align-items: center; gap: 8px; }
        .btn-primary { background-color: var(--primary); color: #000; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-record { background-color: var(--error); color: white; }
        .btn-record.recording { animation: pulse 1.5s infinite; }
        .btn-stop-record { background-color: #555; color: white; display: none; }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(207, 102, 121, 0.7); }
            70% { transform: scale(1.05); box-shadow: 0 0 0 10px rgba(207, 102, 121, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(207, 102, 121, 0); }
        }

        /* Lista */
        .alarm-list { list-style: none; max-height: 400px; overflow-y: auto; }
        .alarm-item { background: #252525; margin-bottom: 10px; padding: 12px; border-radius: 8px; border-left: 4px solid var(--secondary); display: flex; justify-content: space-between; align-items: center; }
        .alarm-item.inactive { opacity: 0.5; border-left-color: #555; }
        .alarm-info h3 { font-size: 1.1rem; margin-bottom: 3px; }
        .alarm-info p { font-size: 0.8rem; color: var(--text-muted); }
        .alarm-actions { display: flex; gap: 10px; align-items: center; }
        
        .toggle-switch { position: relative; width: 45px; height: 24px; }
        .toggle-switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 4px; bottom: 4px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--secondary); }
        input:checked + .slider:before { transform: translateX(21px); }

        .btn-delete { background: none; border: none; color: var(--error); cursor: pointer; font-size: 1.2rem; }

        /* Modal */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; justify-content: center; align-items: center; z-index: 1000; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .modal-overlay.active { opacity: 1; pointer-events: all; animation: flashBg 2s infinite alternate; }
        @keyframes flashBg { from { background: rgba(20, 0, 0, 0.95); } to { background: rgba(60, 0, 0, 0.95); } }
        
        .alarm-modal { background: var(--panel-bg); padding: 30px; border-radius: 20px; text-align: center; border: 2px solid var(--error); max-width: 90%; width: 400px; }
        .alarm-modal h2 { color: var(--error); font-size: 2rem; border: none; animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: translate(1px, 1px) rotate(0deg); } 25% { transform: translate(-1px, -2px) rotate(-1deg); } 50% { transform: translate(-1px, 2px) rotate(1deg); } 75% { transform: translate(2px, -1px) rotate(0deg); } 100% { transform: translate(1px, -1px) rotate(-1deg); } }
        .modal-buttons { display: flex; gap: 10px; margin-top: 20px; }
        .btn-snooze { background-color: #555; color: white; }
        .btn-dismiss { background-color: var(--error); color: white; }

        .toast { position: fixed; bottom: 20px; right: 20px; background: #333; color: white; padding: 12px 20px; border-radius: 5px; border-left: 4px solid var(--secondary); transform: translateY(100px); transition: transform 0.3s; z-index: 2000; max-width: 300px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .toast.show { transform: translateY(0); }
        .toast.error { border-left-color: var(--error); }
    </style>
</head>
<body>

    <header>
        <div class="clock-container" id="digitalClock">00:00:00</div>
        <div class="next-alarm-info" id="nextAlarmDisplay"></div>
        <div class="date-display" id="dateDisplay">Carregando data...</div>
    </header>

    <main>
        <!-- Painel de Configuração -->
        <section class="card">
            <h2>Novo Alarme</h2>
            
            <div class="form-group">
                <label>Horário</label>
                <input type="time" id="alarmTime" required>
            </div>

            <div class="form-group">
                <label>Nome do Alarme</label>
                <input type="text" id="alarmLabel" placeholder="Ex: Tomar remédio">
            </div>

            <div class="form-group">
                <label>Tipo de Som</label>
                <div class="tabs">
                    <div class="tab active" onclick="switchTab('record')">🎤 Gravar</div>
                    <div class="tab" onclick="switchTab('ai')">🤖 IA (Texto)</div>
                </div>

                <div id="mode-record" class="audio-mode active">
                    <p style="font-size: 0.85rem; margin-bottom: 10px; color: var(--text-muted);">
                        Grave áudios curtos (max 15s) para economizar memória.
                    </p>
                    <div style="display: flex; gap: 10px;">
                        <button id="btnStartRecord" class="btn btn-record">🎤 Gravar</button>
                        <button id="btnStopRecord" class="btn btn-stop-record">⏹ Parar</button>
                    </div>
                    <div id="recordStatus" style="margin-top: 10px; font-size: 0.8rem; color: var(--secondary);"></div>
                    <audio id="audioPreview" controls style="width: 100%; margin-top: 10px; display: none;"></audio>
                </div>

                <div id="mode-ai" class="audio-mode">
                    <label>Escolha a Voz</label>
                    <select id="voiceSelect"><option value="">Carregando vozes...</option></select>
                    <label style="margin-top: 10px;">Frase para a IA</label>
                    <textarea id="aiPhrase" rows="2" style="resize: none;" placeholder="Bom dia!">Bom dia! Hora de acordar!</textarea>
                    <button class="btn btn-primary" style="margin-top: 10px;" onclick="testVoice()">🔊 Testar Áudio</button>
                </div>
            </div>

            <button class="btn btn-primary" onclick="saveAlarm()">💾 Salvar Alarme</button>
            <button class="btn" style="margin-top: 10px; background-color: #333; color: #888;" onclick="clearDatabase()">🗑️ Limpar Tudo</button>
        </section>

        <!-- Lista de Alarmes -->
        <section class="card">
            <h2>Alarmes Salvos</h2>
            <div id="emptyState" style="text-align: center; padding: 30px; color: #555;">
                Nenhum alarme configurado.
            </div>
            <ul id="alarmList" class="alarm-list"></ul>
        </section>
    </main>

    <!-- Modal -->
    <div class="modal-overlay" id="alarmModal">
        <div class="alarm-modal">
            <h2>⏰ ALARME!</h2>
            <h3 id="modalLabel" style="color: white; margin-bottom: 15px; font-size: 1.2rem;">Hora de acordar</h3>
            <p id="modalSoundInfo" style="margin-bottom: 20px; color: #aaa; font-size: 0.9rem;"></p>
            <div class="modal-buttons">
                <button class="btn btn-snooze" onclick="snoozeAlarm()">😴 Soneca (+5m)</button>
                <button class="btn btn-dismiss" onclick="stopAlarm()">🛑 Parar</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        // --- ESTADO GLOBAL ---
        let alarms = [];
        let mediaRecorder;
        let audioChunks = [];
        let currentAudioBlob = null;
        let currentAudioBase64 = null;
        let voices = [];
        let activeAlarmSound = null;
        let activeSpeech = null;
        let alarmTimeout = null;
        let userInteracted = false;

        // --- INICIALIZAÇÃO ---
        document.addEventListener('DOMContentLoaded', () => {
            initClock(); // Inicia relógio primeiro
            initVoices();
            
            // Tentar carregar dados, se falhar, inicia vazio para não quebrar
            try {
                alarms = JSON.parse(localStorage.getItem('myAlarms')) || [];
            } catch (e) {
                console.error("Erro ao carregar banco de dados", e);
                alarms = [];
            }
            
            renderAlarms();
            updateNextAlarmDisplay();

            document.body.addEventListener('click', () => { userInteracted = true; }, { once: true });

            document.getElementById('btnStartRecord').addEventListener('click', startRecording);
            document.getElementById('btnStopRecord').addEventListener('click', stopRecording);

            const now = new Date();
            document.getElementById('alarmTime').value = now.toTimeString().substring(0,5);
        });

        // --- RELÓGIO (CORRIGIDO E PROTEGIDO) ---
        function initClock() {
            const clockEl = document.getElementById('digitalClock');
            const dateEl = document.getElementById('dateDisplay');
            
            // Verificação de segurança
            if (!clockEl || !dateEl) {
                console.error("Erro fatal: Elementos do relógio não encontrados no HTML.");
                return;
            }

            // Loop seguro
            setInterval(() => {
                try {
                    const now = new Date();
                    
                    // Atualizar o Relógio
                    clockEl.innerText = now.toLocaleTimeString('pt-BR');
                    
                    // Atualizar a Data
                    dateEl.innerText = now.toLocaleDateString('pt-BR', { 
                        weekday: 'long', 
                        day: 'numeric', 
                        month: 'long' 
                    });
                    
                    // Chamar verificação de alarmes (isolada)
                    checkAlarms(now);
                    
                } catch (error) {
                    console.error("Erro no loop do relógio (mas relógio continuará rodando):", error);
                }
            }, 1000);
            
            // Chamada imediata para não esperar 1 segundo
            clockEl.innerText = new Date().toLocaleTimeString('pt-BR');
        }

        // --- LÓGICA DE ALARMES ---
        function checkAlarms(now) {
            if (!Array.isArray(alarms)) return; // Segurança extra

            const currentDateTimeStr = now.toISOString().substring(0, 16); // Ex: 2023-10-27T14:00
            const currentTimeStr = currentDateTimeStr.substring(11, 16); // Ex: 14:00

            alarms.forEach(alarm => {
                // Segurança: Se o alarme não tiver as propriedades esperadas, ignora
                if (!alarm || !alarm.time) return;
                if (!alarm.active) return;

                const alarmDateTimeToday = currentDateTimeStr.substring(0, 11) + alarm.time;
                
                if (currentTimeStr === alarm.time && alarm.lastTriggered !== alarmDateTimeToday) {
                    triggerAlarm(alarm);
                    alarm.lastTriggered = alarmDateTimeToday;
                    saveToDb(true);
                }
            });
        }

        function updateNextAlarmDisplay() {
            const display = document.getElementById('nextAlarmDisplay');
            if (!display) return;
            
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            
            let nextAlarm = null;
            let minDiff = Infinity;

            if (Array.isArray(alarms)) {
                alarms.forEach(a => {
                    if (!a || !a.active) return;
                    const [h, m] = a.time.split(':').map(Number);
                    if (isNaN(h) || isNaN(m)) return;
                    
                    const alarmMinutes = h * 60 + m;
                    let diff = alarmMinutes - currentMinutes;
                    if (diff < 0) diff += 1440; 
                    
                    if (diff < minDiff) {
                        minDiff = diff;
                        nextAlarm = a;
                    }
                });
            }

            if (nextAlarm) {
                display.innerText = `⏰ Próximo: ${nextAlarm.time} - ${nextAlarm.label}`;
            } else {
                display.innerText = "";
            }
        }

        // --- VOZES (IA) ---
        function initVoices() {
            const populate = () => {
                voices = window.speechSynthesis.getVoices();
                const select = document.getElementById('voiceSelect');
                if(!select) return;
                select.innerHTML = '';
                voices.sort((a,b) => (a.lang.includes('pt') ? -1 : 1));
                voices.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.name;
                    opt.textContent = `${v.name} (${v.lang})`;
                    select.appendChild(opt);
                });
            };
            populate();
            window.speechSynthesis.onvoiceschanged = populate;
        }

        function testVoice() {
            const text = document.getElementById('aiPhrase').value;
            const voice = document.getElementById('voiceSelect').value;
            speak(text, voice);
        }

        function speak(text, voiceName) {
            if (!text) return;
            window.speechSynthesis.cancel();
            const u = new SpeechSynthesisUtterance(text);
            const v = voices.find(x => x.name === voiceName);
            if (v) u.voice = v;
            window.speechSynthesis.speak(u);
        }

        // --- GRAVAÇÃO DE ÁUDIO ---
        async function startRecording() {
            if (!navigator.mediaDevices?.getUserMedia) {
                showToast("Erro: Navegador não suporta microfone.", true);
                return;
            }

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream, { mimeType: 'audio/webm' });
                audioChunks = [];

                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                
                mediaRecorder.onstop = () => {
                    const blob = new Blob(audioChunks, { type: 'audio/webm' });
                    currentAudioBlob = blob;
                    
                    const reader = new FileReader();
                    reader.readAsDataURL(blob);
                    reader.onloadend = () => {
                        currentAudioBase64 = reader.result;
                        const preview = document.getElementById('audioPreview');
                        if(preview) {
                            preview.src = currentAudioBase64;
                            preview.style.display = 'block';
                        }
                        const status = document.getElementById('recordStatus');
                        if(status) status.innerText = "Gravação pronta!";
                    };
                    stream.getTracks().forEach(t => t.stop());
                };

                mediaRecorder.start();
                
                const btnStart = document.getElementById('btnStartRecord');
                const btnStop = document.getElementById('btnStopRecord');
                const status = document.getElementById('recordStatus');
                const preview = document.getElementById('audioPreview');

                if(btnStart) btnStart.style.display = 'none';
                if(btnStop) btnStop.style.display = 'inline-flex';
                if(status) status.innerText = "Gravando...";
                if(preview) preview.style.display = 'none';

            } catch (err) {
                console.error(err);
                showToast("Erro ao acessar microfone.", true);
            }
        }

        function stopRecording() {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
                const btnStart = document.getElementById('btnStartRecord');
                const btnStop = document.getElementById('btnStopRecord');
                
                if(btnStart) {
                    btnStart.style.display = 'inline-flex';
                    btnStart.innerText = "🎤 Re gravar";
                }
                if(btnStop) btnStop.style.display = 'none';
            }
        }

        // --- GERENCIAMENTO DE DADOS ---
        function switchTab(mode) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.audio-mode').forEach(m => m.classList.remove('active'));
            if (mode === 'record') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                const recordMode = document.getElementById('mode-record');
                if(recordMode) recordMode.classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                const aiMode = document.getElementById('mode-ai');
                if(aiMode) aiMode.classList.add('active');
            }
        }

        function saveAlarm() {
            const timeInput = document.getElementById('alarmTime');
            const labelInput = document.getElementById('alarmLabel');
            
            if (!timeInput || !labelInput) return;
            
            const time = timeInput.value;
            const label = labelInput.value || "Alarme";
            const isRecord = document.getElementById('mode-record').classList.contains('active');
            let soundData = null;

            if (isRecord) {
                if (!currentAudioBase64) {
                    showToast("Por favor, grave um áudio primeiro.", true);
                    return;
                }
                if (currentAudioBase64.length > 1500000) {
                    showToast("Áudio muito longo! Grave algo mais curto (max 15s).", true);
                    return;
                }
                soundData = { type: 'audio', src: currentAudioBase64 };
            } else {
                const phraseInput = document.getElementById('aiPhrase');
                const voiceInput = document.getElementById('voiceSelect');
                
                if(!phraseInput || !voiceInput) return;

                soundData = {
                    type: 'tts',
                    text: phraseInput.value,
                    voice: voiceInput.value
                };
            }

            const newAlarm = {
                id: Date.now(),
                time,
                label,
                sound: soundData,
                active: true,
                lastTriggered: null 
            };

            alarms.push(newAlarm);
            
            try {
                saveToDb();
                renderAlarms();
                updateNextAlarmDisplay();
                showToast("Alarme salvo!");
                labelInput.value = "";
                currentAudioBase64 = null;
                const preview = document.getElementById('audioPreview');
                if(preview) preview.style.display = 'none';
            } catch (e) {
                console.error(e);
                if (e.name === 'QuotaExceededError') {
                    showToast("Memória cheia! Apague alarmes com áudio.", true);
                } else {
                    showToast("Erro ao salvar.", true);
                }
            }
        }

        function saveToDb(silent = false) {
            localStorage.setItem('myAlarms', JSON.stringify(alarms));
            if (!silent) showToast("Banco de dados atualizado.");
        }

        function clearDatabase() {
            if(confirm("Tem certeza? Isso apagará TODOS os alarmes.")) {
                alarms = [];
                localStorage.removeItem('myAlarms');
                renderAlarms();
                updateNextAlarmDisplay();
                showToast("Banco de dados limpo.");
            }
        }

        function deleteAlarm(id) {
            if(confirm("Apagar este alarme?")) {
                alarms = alarms.filter(a => a.id !== id);
                saveToDb();
                renderAlarms();
                updateNextAlarmDisplay();
            }
        }

        function toggleAlarm(id) {
            const a = alarms.find(x => x.id === id);
            if (a) {
                a.active = !a.active;
                saveToDb();
                renderAlarms();
                updateNextAlarmDisplay();
            }
        }

        function renderAlarms() {
            const list = document.getElementById('alarmList');
            const empty = document.getElementById('emptyState');
            if (!list || !empty) return;

            list.innerHTML = '';
            
            if (alarms.length === 0) { 
                empty.style.display = 'block'; 
                return; 
            }
            empty.style.display = 'none';

            alarms.sort((a, b) => a.time.localeCompare(b.time));

            alarms.forEach(a => {
                const li = document.createElement('li');
                li.className = `alarm-item ${a.active ? '' : 'inactive'}`;
                const icon = a.sound.type === 'audio' ? '🎤' : '🤖';
                li.innerHTML = `
                    <div class="alarm-info">
                        <h3>${a.time} <span style="font-size:0.8rem; color:${a.active?'#fff':'#777'}">(${a.active?'Ativo':'Inativo'})</span></h3>
                        <p>${a.label}</p>
                        <p style="font-size:0.75rem; color:var(--secondary)">${icon} ${a.sound.type === 'audio' ? 'Áudio Personalizado' : 'Voz IA'}</p>
                    </div>
                    <div class="alarm-actions">
                        <label class="toggle-switch">
                            <input type="checkbox" ${a.active?'checked':''} onchange="toggleAlarm(${a.id})">
                            <span class="slider"></span>
                        </label>
                        <button class="btn-delete" onclick="deleteAlarm(${a.id})">🗑️</button>
                    </div>
                `;
                list.appendChild(li);
            });
        }

        // --- DISPARO DO ALARME ---
        function triggerAlarm(alarm) {
            const modal = document.getElementById('alarmModal');
            const labelEl = document.getElementById('modalLabel');
            const infoEl = document.getElementById('modalSoundInfo');
            
            if(!modal || !labelEl || !infoEl) return;

            labelEl.innerText = alarm.label;
            infoEl.innerText = alarm.sound.type === 'audio' ? "Tocando sua gravação..." : `IA: "${alarm.sound.text}"`;
            modal.classList.add('active');

            if (alarm.sound.type === 'audio') {
                if (activeAlarmSound) activeAlarmSound.pause();
                activeAlarmSound = new Audio(alarm.sound.src);
                activeAlarmSound.loop = true;
                
                const playPromise = activeAlarmSound.play();
                if (playPromise !== undefined) {
                    playPromise.catch(error => {
                        console.error("Autoplay impedido:", error);
                        showToast("Toque na tela para ativar o áudio", true);
                    });
                }
            } else {
                window.speechSynthesis.cancel();
                activeSpeech = new SpeechSynthesisUtterance(alarm.sound.text);
                if (alarm.sound.voice) {
                    const v = voices.find(x => x.name === alarm.sound.voice);
                    if (v) activeSpeech.voice = v;
                }
                
                activeSpeech.onend = () => {
                    if (modal.classList.contains('active')) {
                        setTimeout(() => window.speechSynthesis.speak(activeSpeech), 1000);
                    }
                };
                window.speechSynthesis.speak(activeSpeech);
            }
        }

        function stopAlarm() {
            const modal = document.getElementById('alarmModal');
            if(!modal) return;

            modal.classList.remove('active');
            if (activeAlarmSound) {
                activeAlarmSound.pause();
                activeAlarmSound = null;
            }
            if (activeSpeech || alarmTimeout) {
                window.speechSynthesis.cancel();
                clearTimeout(alarmTimeout);
                activeSpeech = null;
                alarmTimeout = null;
            }
            saveToDb(true);
        }

        function snoozeAlarm() {
            stopAlarm();
            showToast("Soneca de 5 minutos.");
            const now = new Date();
            now.setMinutes(now.getMinutes() + 5);
            const timeStr = now.toTimeString().substring(0,5);
            
            const snooze = {
                id: Date.now(),
                time: timeStr,
                label: "Soneca ⏰",
                sound: alarms.length ? alarms[alarms.length-1].sound : { type: 'tts', text: 'Acordou?', voice: '' },
                active: true,
                lastTriggered: null
            };
            alarms.push(snooze);
            saveToDb();
            renderAlarms();
            updateNextAlarmDisplay();
        }

        function showToast(msg, isError = false) {
            const t = document.getElementById('toast');
            if(!t) return;
            t.innerText = msg;
            t.className = isError ? 'toast error show' : 'toast show';
            setTimeout(() => t.classList.remove('show'), 4000);
        }
    </script>
</body>
</html>
